name: Build Cross-Platform Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-can gs_usb pyusb libusb pyinstaller

    - name: Locate and Package Windows libusb Binary
      shell: pwsh
      run: |
        # Locate where pip installed the libusb library files on the Windows runner
        $LibUsbPath = python -c "import os, importlib.util; spec = importlib.util.find_spec('libusb'); print(spec.submodule_search_locations[0] if spec else '')"
        $DllSource = Join-Path $LibUsbPath "_platform\_windows\x64\libusb-1.0.dll"
        
        # Fallback configuration path just in case wheel variations differ
        if (-not (Test-Path $DllSource)) {
            $DllSource = Join-Path $LibUsbPath "_platform_mechanics\x64\libusb-1.0.dll"
        }
        
        Write-Output "Targeting libusb DLL from: $DllSource"
        
        # Copy the DLL into the repository root so PyInstaller can easily grab it
        Copy-Item -Path $DllSource -Destination .\libusb-1.0.dll

    - name: Build Executable with PyInstaller
      run: |
        # --add-binary="libusb-1.0.dll;." embeds the file directly into the root execution space
        pyinstaller --onefile \
          --name="kawasaki_clutch_relearn" \
          --add-binary="libusb-1.0.dll;." \
          --collect-all gs_usb \
          --collect-all can \
          kawasaki_clutch_relearn.py

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kawasaki-clutch-relearn-windows
        path: dist/kawasaki_clutch_relearn.exe
        if-no-files-found: error

  build-mac:
    name: Build macOS Standalone Binary
    runs-on: macos-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: brew install libusb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-can gs_usb pyusb pyinstaller

    - name: Build Standalone Binary with PyInstaller
      run: |
        pyinstaller --onefile \
          --name="kawasaki_clutch_relearn" \
          --add-binary="/opt/homebrew/lib/libusb-1.0.dylib:." \
          --collect-all gs_usb \
          --collect-all can \
          kawasaki_clutch_relearn.py

    - name: Upload macOS Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kawasaki-clutch-relearn-mac
        path: dist/kawasaki_clutch_relearn
        if-no-files-found: error
