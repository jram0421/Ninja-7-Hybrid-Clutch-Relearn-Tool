name: Build Cross-Platform Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: kawasaki-clutch-relearn-windows
            output_file: dist/kawasaki_clutch_relearn.exe
          - os: macos-latest
            artifact_name: kawasaki-clutch-relearn-mac
            output_file: dist/kawasaki_clutch_relearn.app

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Highly stable version for PyInstaller frozen hooks

    - name: Install System Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install libusb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-can gs_usb pyusb libusb pyinstaller

    - name: Build Executable with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --name="kawasaki_clutch_relearn" --collect-all gs_usb --collect-all can kawasaki_clutch_relearn.py

    - name: Build App Bundle with PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --onedir --windowed --name="kawasaki_clutch_relearn" --collect-all gs_usb --collect-all can kawasaki_clutch_relearn.py

    - name: Upload Build Artifacts
      uses: actions/artifacts@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.output_file }}
        if-no-files-found: error
