name: Build Cross-Platform Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-can gs_usb pyusb libusb pyinstaller

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --onefile --name="kawasaki_clutch_relearn" --collect-all gs_usb --collect-all can kawasaki_clutch_relearn.py

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kawasaki-clutch-relearn-windows
        path: dist/kawasaki_clutch_relearn.exe
        if-no-files-found: error

  build-mac:
    name: Build macOS App & DMG
    runs-on: macos-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: brew install libusb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-can gs_usb pyusb pyinstaller

    - name: Build App Bundle with PyInstaller
      run: |
        pyinstaller --onedir --console \
          --name="kawasaki_clutch_relearn" \
          --add-binary="/opt/homebrew/lib/libusb-1.0.dylib:." \
          --collect-all gs_usb \
          --collect-all can \
          kawasaki_clutch_relearn.py

    - name: Create Standalone DMG Installer
      run: |
        # Create a temporary staging directory for the installer layout
        mkdir -p dmg_stage
        
        # Copy the raw output folder into the staging area, adding the .app extension 
        # so macOS treats it as a single clickable application launch bundle
        cp -R dist/kawasaki_clutch_relearn dmg_stage/kawasaki_clutch_relearn.app
        
        # Build the final mountable .dmg file
        hdiutil create -volname "Kawasaki Relearn Installer" -srcfolder dmg_stage -ov -format UDZO dist/kawasaki_clutch_relearn.dmg

    - name: Upload macOS DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kawasaki-clutch-relearn-mac
        path: dist/kawasaki_clutch_relearn.dmg
        if-no-files-found: error
