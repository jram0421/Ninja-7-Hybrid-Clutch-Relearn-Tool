name: Build Cross-Platform Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-can gs_usb pyusb libusb pyinstaller

    - name: Download and Extract Clean libusb Binary
      shell: pwsh
      run: |
        # Download the official compiled libusb binaries directly from GitHub releases
        Invoke-WebRequest -Uri "https://github.com/libusb/libusb/releases/download/v1.0.27/libusb-1.0.27.7z" -OutFile "libusb.7z"
        
        # Extract the archive using 7-Zip (built natively into the GitHub Windows runner image)
        7z x libusb.7z -o"libusb_extracted"
        
        # Copy the true, isolated 64-bit DLL straight into our repository workspace root
        Copy-Item -Path "libusb_extracted\VS2015-x64\dll\libusb-1.0.dll" -Destination .\libusb-1.0.dll
        
        Write-Output "Successfully downloaded and verified 64-bit libusb-1.0.dll"

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --onefile \
          --name="kawasaki_clutch_relearn" \
          --add-binary="libusb-1.0.dll;." \
          --collect-all gs_usb \
          --collect-all can \
          kawasaki_clutch_relearn.py

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kawasaki-clutch-relearn-windows
        path: dist/kawasaki_clutch_relearn.exe
        if-no-files-found: error

  build-mac:
    name: Build macOS Standalone Binary
    runs-on: macos-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: brew install libusb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-can gs_usb pyusb pyinstaller

    - name: Build Standalone Binary with PyInstaller
      run: |
        pyinstaller --onefile \
          --name="kawasaki_clutch_relearn" \
          --add-binary="/opt/homebrew/lib/libusb-1.0.dylib:." \
          --collect-all gs_usb \
          --collect-all can \
          kawasaki_clutch_relearn.py

    - name: Upload macOS Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kawasaki-clutch-relearn-mac
        path: dist/kawasaki_clutch_relearn
        if-no-files-found: error
