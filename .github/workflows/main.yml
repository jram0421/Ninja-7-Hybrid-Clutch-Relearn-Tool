name: Build Cross-Platform Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-can gs_usb pyusb libusb pyinstaller

    - name: Extract libusb Binary from Specified Path
      shell: pwsh
      run: |
        # Download the target compiled library asset bundle directly
        Invoke-WebRequest -Uri "https://github.com/libusb/libusb/releases/download/v1.0.27/libusb-1.0.27.7z" -OutFile "libusb.7z"
        
        # Extract the archive into a dedicated directory using the native runner utility
        7z x libusb.7z -o"libusb_extracted"
        
        # Pull the 64-bit binary from your specified layout directory
        $TargetDllPath = "libusb_extracted\VS2025\MS64\dll\libusb-1.0.dll"
        
        if (Test-Path $TargetDllPath) {
            Write-Output "Target matched! Copying library file from: $TargetDllPath"
            Copy-Item -Path $TargetDllPath -Destination .\libusb-1.0.dll
        } else {
            # Safety check: If the zip layout slightly varies, print the root directory contents to debug
            Write-Output "[WARNING] Specific path not found. Checking root folders inside archive..."
            Get-ChildItem -Path "libusb_extracted" -Recurse -Filter "libusb-1.0.dll" | Select-Object -First 1 | ForEach-Object {
                Write-Output "Located fallback target file at: $($_.FullName)"
                Copy-Item -Path $_.FullName -Destination .\libusb-1.0.dll
            }
        }
        
        # Final confirmation block for the subsequent build step
        if (Test-Path .\libusb-1.0.dll) {
            Write-Output "Successfully staged libusb-1.0.dll in workspace root."
        } else {
            Throw "Critical Error: Failed to secure a valid libusb-1.0.dll file."
        }

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --onefile \
          --name="kawasaki_clutch_relearn" \
          --add-binary="libusb-1.0.dll;." \
          --collect-all gs_usb \
          --collect-all can \
          kawasaki_clutch_relearn.py

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kawasaki-clutch-relearn-windows
        path: dist/kawasaki_clutch_relearn.exe
        if-no-files-found: error

  build-mac:
    name: Build macOS Standalone Binary
    runs-on: macos-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: brew install libusb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-can gs_usb pyusb pyinstaller

    - name: Build Standalone Binary with PyInstaller
      run: |
        pyinstaller --onefile \
          --name="kawasaki_clutch_relearn" \
          --add-binary="/opt/homebrew/lib/libusb-1.0.dylib:." \
          --collect-all gs_usb \
          --collect-all can \
          kawasaki_clutch_relearn.py

    - name: Upload macOS Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kawasaki-clutch-relearn-mac
        path: dist/kawasaki_clutch_relearn
        if-no-files-found: error
